name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/oe5xrx/station-manager:latest
            ghcr.io/oe5xrx/station-manager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: build
    env:
      DEPLOY_DIR: /home/deploy/station-manager
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: deploy

      - name: Sync deploy files to server
        run: cp deploy/* ${DEPLOY_DIR}/

      - name: Pull new images
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.prod.yml pull

      - name: Start services
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.prod.yml up -d --force-recreate web db redis nginx station-monitor alert-monitor

      - name: Run migrations
        working-directory: ${{ env.DEPLOY_DIR }}
        run: docker compose -f docker-compose.prod.yml exec web python manage.py migrate --noinput

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -sf https://ham.oe5xrx.org/api/v1/health/; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          exit 1
