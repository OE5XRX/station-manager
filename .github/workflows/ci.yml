name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements/dev.txt', 'requirements/base.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system deps (guestfish for provisioning tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libguestfs-tools linux-image-generic
          # Ubuntu ships kernels with 0600 perms; libguestfs's supermin needs read access.
          # Guard the glob so CI does not fail on runner images where
          # the kernel lives somewhere else (or no file matches).
          for k in /boot/vmlinuz-*; do
            [ -e "$k" ] && sudo chmod +r "$k"
          done

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run tests
        run: pytest
