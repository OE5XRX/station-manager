services:
  web:
    build:
      context: .
      args:
        DEV: "true"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      db:
        condition: service_healthy

  station-monitor:
    build:
      context: .
      args:
        DEV: "true"
    command: python manage.py check_station_status --loop --interval 30
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  alert-monitor:
    build:
      context: .
      args:
        DEV: "true"
    command: python manage.py check_alerts --loop --interval 30
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=station_manager
      - POSTGRES_USER=station_manager
      - POSTGRES_PASSWORD=station_manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U station_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
