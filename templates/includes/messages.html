{% load i18n %}
{% if messages %}
  <div class="flash-stack" role="status" aria-live="polite">
    {% for message in messages %}
      <div class="flash {{ message.tags }}">
        <div>{{ message }}</div>
        <button type="button" class="flash-close" aria-label="{% trans 'Dismiss' %}">&times;</button>
      </div>
    {% endfor %}
  </div>
{% endif %}
