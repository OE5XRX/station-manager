{% load i18n %}
<header class="topbar">
  <button type="button" class="menu-toggle" data-menu-toggle aria-label="{% trans 'Toggle navigation' %}">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
    </svg>
  </button>

  <svg class="waveform" viewBox="0 0 80 22" fill="none" aria-hidden="true">
    <rect class="wavebar" x="2"  y="4" width="4" height="14" fill="var(--accent)" opacity="0.8" rx="1"/>
    <rect class="wavebar" x="12" y="4" width="4" height="14" fill="var(--accent)" opacity="0.7" rx="1"/>
    <rect class="wavebar" x="22" y="4" width="4" height="14" fill="var(--accent)" opacity="0.9" rx="1"/>
    <rect class="wavebar" x="32" y="4" width="4" height="14" fill="var(--accent)" opacity="0.6" rx="1"/>
    <rect class="wavebar" x="42" y="4" width="4" height="14" fill="var(--accent)" opacity="0.85" rx="1"/>
    <rect class="wavebar" x="52" y="4" width="4" height="14" fill="var(--accent)" opacity="0.55" rx="1"/>
    <rect class="wavebar" x="62" y="4" width="4" height="14" fill="var(--accent)" opacity="0.75" rx="1"/>
    <rect class="wavebar" x="72" y="4" width="4" height="14" fill="var(--accent)" opacity="0.5" rx="1"/>
  </svg>

  <nav class="topbar-crumbs" aria-label="{% trans 'Breadcrumb' %}">
    {% block breadcrumbs %}
      <span class="cur">{% trans "Overview" %}</span>
    {% endblock %}
  </nav>

  <span class="pill pill-muted" data-ws-indicator>OFFLINE</span>

  <span class="topbar-clock" title="{% trans 'Current UTC time' %}">
    <span class="utc">UTC</span><span data-utc-clock>—</span>
  </span>

  <button type="button" class="theme-toggle" data-theme-toggle title="{% trans 'Toggle theme' %}" aria-label="{% trans 'Toggle theme' %}">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
    <span>{% trans "Theme" %}</span>
  </button>

  <form action="{% url 'set_language' %}" method="post" style="margin:0;display:inline-flex;align-items:center;gap:4px;" data-lang-form>
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.path }}">
    <select name="language" class="form-select" data-lang-select style="width:auto;padding:5px 24px 5px 8px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;">
      {% get_current_language as cur_lang %}
      {% get_available_languages as langs %}
      {% for code, name in langs %}
        <option value="{{ code }}" {% if code == cur_lang %}selected{% endif %}>{{ code|upper }}</option>
      {% endfor %}
    </select>
  </form>
</header>
