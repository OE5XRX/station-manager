{% load i18n %}
<form method="post" action="{% url 'stations:station_log_add' station.pk %}">
  {% csrf_token %}
  <div class="form-row">
    <div class="form-group"><label class="form-label">{% trans "Entry type" %}</label>{{ form.entry_type }}</div>
    <div class="form-group"><label class="form-label">{% trans "Title" %}</label>{{ form.title }}</div>
  </div>
  <div class="form-group"><label class="form-label">{% trans "Message" %}</label>{{ form.message }}</div>
  <button type="submit" class="btn btn-primary">{% trans "Add entry" %}</button>
</form>
