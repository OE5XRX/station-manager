{% load i18n %}
{% if user.role == 'admin' %}
<section class="panel mt-20">
  <div class="panel-head">
    <div class="panel-title"><span class="dot"></span>{% trans "Provisioning" %}</div>
  </div>
  <div class="panel-body">
    {% if active_provisioning_job %}
      <div hx-get="{% url 'provisioning:status' active_provisioning_job.id %}"
           hx-trigger="load, every 3s"
           hx-swap="innerHTML">
        {% include "provisioning/_job_status.html" with job=active_provisioning_job %}
      </div>
    {% else %}
      <form method="post" action="{% url 'provisioning:new' station.pk %}">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="id_image_release">{% trans "Image version" %}</label>
          <select name="image_release" id="id_image_release" required>
            {% for img in image_releases %}
              <option value="{{ img.pk }}"{% if img.is_latest %} selected{% endif %}>
                {{ img.tag }} &mdash; {{ img.get_machine_display }}{% if img.is_latest %} ({% trans "latest" %}){% endif %}
              </option>
            {% endfor %}
          </select>
        </div>
        <button type="submit" class="btn btn-primary">{% trans "Generate provisioning bundle" %}</button>
      </form>
    {% endif %}

    {% include "provisioning/_install_instructions.html" %}
  </div>
</section>
{% endif %}
